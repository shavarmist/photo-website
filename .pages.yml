content:
  - name: posts
    label: Blog
    type: collection
    path: _posts
    filename: {template: '{year}-{month}-{day}-{primary}.md', field: create}
    fields:
      - name: layout
        label: Layout
        type: string
        default: post

      - name: date
        label: Date
        type: date
        default: now
        
      - name: title
        label: Title
        type: string

      - name: blurb
        label: Blurb
        type: string

      - name: og_image
        label: Thumbnail
        type: string

      - name: body
        type: rich-text

  - name: home
    label: Pocetna
    type: file
    path: index.md
    fields:
      - name: layout
        label: layout
        type: string
        default: home

      - name: profile_picture
        label: Slika
        type: object
        fields:
          - name: src
            label: URL
            type: string

          - name: alt
            label: alt tekst
            type: string

      - name: body
        type: rich-text